name: Automation Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ensure Talent Matchmakers exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:38460545&rows=1" | jq '.response.numFound')
          
          echo "Talent Matchmakers count in company core: $EXISTING"
          
          if [ "$EXISTING" -eq "0" ]; then
            echo "Talent Matchmakers not found - adding to company core..."
            echo '[{"id":"38460545","company":"TALENT MATCHMAKERS S.R.L.","brand":"Talent Matchmakers","status":"activ","location":["Bucuresti"],"lastScraped":"2026-04-20","scraperFile":"https://raw.githubusercontent.com/sebiboga/talent-matchmakers-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json
            
            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "Talent Matchmakers already exists in company core - no action needed"
          fi
          
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:38460545&rows=1" | jq '.response.numFound')
          
          echo "Talent Matchmakers count after check: $FINAL"
          
          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: Talent Matchmakers is in company core"
          else
            echo "❌ FAILED: Talent Matchmakers still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit -- --outputFile=test-results-unit.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: npm run test:integration -- --outputFile=test-results-integration.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: npm run test:e2e -- --outputFile=test-results-e2e.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30